<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Bảo trì CT34</title>
<meta name="theme-color" content="#1F2A33">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div id="login-screen" class="login-screen">
  <div class="login-card">
    <div class="brand">
      <span class="brand-mark">CT34</span>
      <span class="brand-sub">BẢO TRÌ &amp; VỆ SINH</span>
    </div>
    <form id="login-form">
      <label>Email
        <input type="email" id="login-email" required autocomplete="username">
      </label>
      <label>Mật khẩu
        <input type="password" id="login-password" required autocomplete="current-password">
      </label>
      <div id="login-error" class="error-text"></div>
      <button type="submit" class="btn btn-primary btn-block">Đăng nhập</button>
    </form>
  </div>
</div>

<div id="app" class="app hidden">
  <header class="topbar">
    <div class="brand-mini"><span class="brand-mark">CT34</span> Bảo trì</div>
    <div class="topbar-user">
      <span id="user-email"></span>
      <button id="logout-btn" class="btn btn-ghost btn-sm">Đăng xuất</button>
    </div>
  </header>

  <nav class="tabbar" id="tabbar">
    <button class="tab-btn active" data-view="dashboard"><span class="tab-icon">◧</span>Tổng quan</button>
    <button class="tab-btn" data-view="engines"><span class="tab-icon">⚙</span>Động cơ</button>
    <button class="tab-btn" data-view="maintenance"><span class="tab-icon">✓</span>Bảo trì</button>
    <button class="tab-btn admin-only" data-view="data"><span class="tab-icon">⇅</span>Dữ liệu</button>
  </nav>

  <main id="view-root" class="view-root"></main>
</div>

<div id="toast" class="toast hidden"></div>

<script src="/js/app.js"></script>
</body>
</html>
